datasets:
  dataset_name: WikipediaPlainText
  dataset_raw_path: basemodel/data/raw/AllCombined.txt
  dataset_tokenize_path: basemodel/data/raw/sent_tokenize_text.txt
  dataset_processed_path: basemodel/data/processed/
  max_dataset: 50000

tokenizer:
  merges_path: basemodel/models/tokenizer/merges.json
  vocab_path: basemodel/models/tokenizer/vocab.json
  vocab_size: 10887

models:
  max_len: 256
  batch_size: 64
  mask_prob: 0.15
  n_heads: 8
  embed_dim: 256
  dropout: 0.1
  n_blocks: 8
  early_stopping_patience: 5
  early_stopping: true
  learning_rate: 0.001
  model_save_path: basemodel/models/checkpoints

  epochs: 15
  eval_interval: 3

downstream:
  dataset_name: metinovadilet/kyrgyz-bench-data-wikiann-ner
  raw_dataset_path: downstream/data/raw
  save_ft_ner_path: downstream/models/checkpoints
  early_stopping_patience: 5
  epochs: 5
  eval_interval: 1
  encoder_lr: 5e-5
  head_lr: 3e-4
  batch_size: 32